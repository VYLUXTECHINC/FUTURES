<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background-color:#000000; font-family:Arial, Helvetica, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#000000;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table width="440" cellpadding="0" cellspacing="0" border="0" style="background:#0a0a0a; border:1px solid #1a1a1a; border-radius:24px; padding:40px;">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <h2 style="font-size:36px; font-weight:700; color:#ffffff; margin:0; font-family:Georgia, serif;">FUTURES</h2>
              <p style="font-size:12px; color:#888888; text-transform:uppercase; letter-spacing:2px; margin:4px 0 0;">Price is the only Indicator</p>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom:24px; border-bottom:1px solid #1a1a1a;">
              <h3 style="color:#ffffff; font-size:18px; margin:0 0 8px;">Verify Your Email</h3>
              <p style="color:#888888; font-size:14px; line-height:1.5; margin:0;">
                Enter the 6‑digit code below in your FUTURES to verify your email address.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:24px 0;">
              <div style="background:#050505; border:1px solid #333; border-radius:12px; padding:16px 32px; display:inline-block;">
                <span style="font-size:28px; font-weight:700; color:#ffffff; letter-spacing:6px;">{{ .Token }}</span>
              </div>
            </td>
          </tr>
          <tr>
            <td style="border-top:1px solid #1a1a1a; padding-top:24px;">
              <p style="color:#888888; font-size:12px; margin:0; line-height:1.5;">
                If you didn't request this code, please ignore this email. The code expires in 10 minutes.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
