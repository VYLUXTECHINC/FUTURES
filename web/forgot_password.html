<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FUTURES – Reset Password</title>
  <link href="https://fonts.bunny.net/css?family=inter:400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3fc;
      --card-bg: rgba(255, 255, 255, 0.94);
      --card-border: rgba(43, 127, 255, 0.3);
      --text: #0a2540;
      --text-muted: #5f7f9e;
      --text-heading: #0a2540;
      --primary: #2b6ef0;
      --primary-fg: #ffffff;
      --success: #2b8c4a;
      --error: #e5484d;
      --input-bg: #f8fafc;
      --border: #e2e8f0;
      --radius: 20px;
      --shadow: 0 10px 30px rgba(0,0,0,0.05);
      --transition: all 0.2s ease;
    }

    [data-theme="dark"] {
      --bg: #050505;
      --card-bg: rgba(15, 15, 15, 0.9);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-muted: #888888;
      --text-heading: #f0f0f0;
      --primary: #ffffff;
      --primary-fg: #000000;
      --success: #22c55e;
      --error: #ef4444;
      --input-bg: #111111;
      --border: #222222;
      --shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem 1rem;
    }

    .app-container {
      width: 100%;
      max-width: 440px;
      position: relative;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .back-btn {
      background: none; border: none; cursor: pointer; color: var(--text);
      display: flex; align-items: center; gap: 0.25rem; font-weight: 600; font-size: 0.95rem;
    }
    .page-title { font-size: 1.25rem; font-weight: 700; color: var(--text-heading); }
    .theme-toggle {
      width: 40px; height: 40px; background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); transition: var(--transition);
    }
    .theme-toggle:hover { transform: scale(1.05); }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.3s;
    }
    .step-dot.active { background: var(--primary); width: 24px; border-radius: 4px; }

    .instruction-text {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 1.25rem;
      text-align: center;
    }

    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.4rem; }
    .form-input {
      width: 100%;
      padding: 0.85rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: var(--transition);
    }
    .form-input:focus { outline: none; border-color: var(--primary); }

    /* OTP Inputs */
    .otp-container {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .otp-input {
      width: 44px; height: 52px;
      background: var(--input-bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      transition: var(--transition);
      caret-color: var(--primary);
    }
    .otp-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(43, 110, 240, 0.15);
    }
    .otp-input.filled {
      border-color: var(--primary);
      background: rgba(43, 110, 240, 0.05);
    }

    .resend-row {
      display: flex;
      justify-content: center;
      margin-top: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .resend-link {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: opacity 0.2s;
    }
    .resend-link:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      color: var(--text-muted);
    }

    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: var(--primary-fg);
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(43, 110, 240, 0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--primary-fg);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .btn-primary.loading .spinner { display: block; }
    .btn-primary.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px;
      padding: 0.75rem 1.25rem; box-shadow: var(--shadow); font-size: 0.9rem; font-weight: 500;
      opacity: 0; transition: all 0.3s ease; z-index: 200; pointer-events: none;
    }
    .toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--error); color: var(--error); }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <h1 class="page-title">Reset Password</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg id="iconSun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="iconMoon" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </header>

    <div class="card">
      <!-- STEP 1: Enter Email -->
      <div id="step1">
        <div class="step-indicator">
          <div class="step-dot active"></div>
          <div class="step-dot"></div>
          <div class="step-dot"></div>
        </div>
        <p class="instruction-text">Enter your email address. We'll send you a 6-digit code to reset your password.</p>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="resetEmail" placeholder="trader@example.com" />
        </div>
        <button class="btn-primary" onclick="handleSendCode()">
          <span class="spinner"></span>
          <span class="btn-text">Send Code</span>
        </button>
      </div>

      <!-- STEP 2: Enter Email Code -->
      <div id="step2" class="hidden">
        <div class="step-indicator">
          <div class="step-dot active"></div>
          <div class="step-dot active"></div>
          <div class="step-dot"></div>
        </div>
        <p class="instruction-text">We've sent a 6-digit code to <strong id="emailDisplay"></strong>. Please check your inbox and spam folder.</p>
        
        <div class="otp-container" id="otpContainer">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="0" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="1" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="2" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="3" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="4" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="5" />
        </div>
        
        <div class="resend-row">
          <button class="resend-link" id="resendOtpBtn" onclick="handleResendCode()">Resend Code <span id="otpTimer">(60s)</span></button>
        </div>

        <button class="btn-primary" id="verifyBtn" onclick="handleVerifyCode()">
          <span class="spinner"></span>
          <span class="btn-text">Verify Code</span>
        </button>
      </div>

      <!-- STEP 3: Set New Password -->
      <div id="step3" class="hidden">
        <div class="step-indicator">
          <div class="step-dot active"></div>
          <div class="step-dot active"></div>
          <div class="step-dot active"></div>
        </div>
        <p class="instruction-text">Code verified. Enter your new password below.</p>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" class="form-input" id="newPassword" placeholder="Min. 6 characters" />
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" />
        </div>
        <button class="btn-primary" onclick="handleUpdatePassword()">
          <span class="spinner"></span>
          <span class="btn-text">Update Password</span>
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /**
     * AI AGENT NOTE: PASSWORD RESET FLOW (EMAIL OTP)
     * -----------------------------------------------------------------------
     * 1. SUPABASE CONFIGURATION:
     *    - Go to Authentication -> Providers -> Email.
     *    - Ensure "User confirmation required" is ON.
     *    - Edit the "Change email address" or "Reset password" template.
     *    - IMPORTANT: The template should expose the `{{ .Token }}` variable so the user sees the code directly in the email, not just a link.
     *    - Example HTML in Email Template: "Your verification code is: <strong>{{ .Token }}</strong>"
     *
     * 2. FRONTEND LOGIC:
     *    - Step 1: Call `supabase.auth.resetPasswordForEmail(email)`.
     *      Note: In Supabase, this usually sends a link. To get a code, you may need to use `signInWithOtp` with `type: 'recovery'` or custom edge function depending on your version. 
     *      Standard practice: If Supabase only sends links by default for password reset, you might need to parse the token from the URL if the user clicks the link, OR use a custom SMTP provider that allows injecting the Token into the body.
     *      For this prototype, we assume the email contains a code.
     *
     * 3. API CALLS:
     *    - Step 1: `await supabase.auth.resetPasswordForEmail(email)`
     *    - Step 2: `await supabase.auth.verifyOtp({ token: otp, type: 'recovery' })` 
     *      (Note: 'recovery' type allows the session to be updated with the new password).
     *    - Step 3: `await supabase.auth.updateUser({ password: newPassword })`
     *
     * 4. NAVIGATION:
     *    - After success, redirect to Login screen: `navigation.replace('Login')`.
     */

    const themeToggle = document.getElementById('themeToggle');
    const iconSun = document.getElementById('iconSun');
    const iconMoon = document.getElementById('iconMoon');
    const html = document.documentElement;
    const toast = document.getElementById('toast');
    const otpInputs = document.querySelectorAll('.otp-input');
    const verifyBtn = document.getElementById('verifyBtn');

    // State
    const state = {
      email: '',
      otpTimer: 60,
      timerInterval: null
    };

    // Theme Toggle Logic
    themeToggle.addEventListener('click', () => {
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      iconSun.classList.toggle('hidden', !isDark);
      iconMoon.classList.toggle('hidden', isDark);
    });

    // OTP Input Handling
    otpInputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/[^0-9]/g, '');
        e.target.value = val;
        if (val) {
          e.target.classList.add('filled');
          if (index < otpInputs.length - 1) otpInputs[index + 1].focus();
        } else {
          e.target.classList.remove('filled');
        }
        checkOtpComplete();
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          otpInputs[index - 1].focus();
          otpInputs[index - 1].value = '';
          otpInputs[index - 1].classList.remove('filled');
          checkOtpComplete();
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasteData = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, 6);
        pasteData.split('').forEach((char, i) => {
          if (otpInputs[i]) {
            otpInputs[i].value = char;
            otpInputs[i].classList.add('filled');
          }
        });
        if (pasteData.length > 0) {
          const focusIndex = Math.min(pasteData.length, otpInputs.length - 1);
          otpInputs[focusIndex].focus();
        }
        checkOtpComplete();
      });
    });

    function getOtpValue() {
      return Array.from(otpInputs).map(i => i.value).join('');
    }

    function checkOtpComplete() {
      const otp = getOtpValue();
      verifyBtn.disabled = otp.length !== 6;
    }

    function clearOtpInputs() {
      otpInputs.forEach(i => { i.value = ''; i.classList.remove('filled'); });
      otpInputs[0].focus();
      checkOtpComplete();
    }

    // Timer Logic
    function startTimer() {
      state.otpTimer = 60;
      document.getElementById('resendOtpBtn').disabled = true;
      document.getElementById('otpTimer').textContent = `(60s)`;
      
      clearInterval(state.timerInterval);
      state.timerInterval = setInterval(() => {
        state.otpTimer--;
        document.getElementById('otpTimer').textContent = `(${state.otpTimer}s)`;
        if (state.otpTimer <= 0) {
          clearInterval(state.timerInterval);
          document.getElementById('resendOtpBtn').disabled = false;
          document.getElementById('otpTimer').textContent = '';
        }
      }, 1000);
    }

    // Step 1: Send Code
    async function handleSendCode() {
      const email = document.getElementById('resetEmail').value.trim();
      if (!email || !email.includes('@')) return showToast('Please enter a valid email.', 'error');

      const btn = document.querySelector('#step1 .btn-primary');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        // AI AGENT NOTE: CALL SUPABASE
        // await supabase.auth.resetPasswordForEmail(email);
        
        await new Promise(r => setTimeout(r, 1500)); // Mock delay
        
        state.email = email;
        document.getElementById('emailDisplay').textContent = email;
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        startTimer();
        otpInputs[0].focus();
        
        showToast('Code sent to your email!', 'success');

      } catch (err) {
        showToast('Failed to send code. Try again.', 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    async function handleResendCode() {
      showToast('Sending new code...', 'success');
      // AI AGENT NOTE: RESEND CODE
      // await supabase.auth.resetPasswordForEmail(state.email);
      startTimer();
    }

    // Step 2: Verify Code
    async function handleVerifyCode() {
      const otp = getOtpValue();
      if (otp.length !== 6) return;

      verifyBtn.disabled = true;
      verifyBtn.classList.add('loading');

      try {
        // AI AGENT NOTE: VERIFY OTP
        // const { data, error } = await supabase.auth.verifyOtp({
        //   token: otp,
        //   type: 'recovery' // Critical for password reset flow
        // });
        // if (error) throw error;

        await new Promise(r => setTimeout(r, 1500)); // Mock delay

        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
        showToast('Code verified!', 'success');

      } catch (err) {
        showToast(err.message || 'Invalid code. Try again.', 'error');
        clearOtpInputs();
      } finally {
        verifyBtn.classList.remove('loading');
        verifyBtn.disabled = false;
      }
    }

    // Step 3: Update Password
    async function handleUpdatePassword() {
      const pw = document.getElementById('newPassword').value;
      const cpw = document.getElementById('confirmPassword').value;

      if (!pw || pw.length < 6) return showToast('Password must be at least 6 chars.', 'error');
      if (pw !== cpw) return showToast('Passwords do not match.', 'error');

      const btn = document.querySelector('#step3 .btn-primary');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        // AI AGENT NOTE: UPDATE PASSWORD
        // const { error } = await supabase.auth.updateUser({ password: pw });
        // if (error) throw error;

        await new Promise(r => setTimeout(r, 1500)); // Mock delay
        
        showToast('Password updated successfully!', 'success');
        
        setTimeout(() => {
          // navigation.replace('Login');
          alert('Redirecting to Login...');
        }, 1000);

      } catch (err) {
        showToast('Update failed. Please try again.', 'error');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function showToast(msg, type) {
      toast.textContent = msg;
      toast.className = `toast visible ${type}`;
      setTimeout(() => { toast.classList.remove('visible'); }, 3000);
    }

    function goBack() {
      window.history.back();
    }
  </script>
</body>
</html>
