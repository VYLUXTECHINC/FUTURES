<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <title>FUTURES</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dancing-script@5.0.18/index.css" />
  <link href="https://fonts.bunny.net/css?family=inter:400;500" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #000000;
      --color-text: #ffffff;
      --color-motto: #bbddff;
      --glow-white: rgba(255, 255, 255, 0.06);
      --glow-text: rgba(255, 255, 255, 0.3);
      --accent-border: rgba(100, 180, 255, 0.3);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--color-bg);
      font-family: "Inter", sans-serif;
    }

    .splash-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(
        circle at 50% 40%,
        var(--glow-white) 0%,
        transparent 80%
      );
      transition: opacity 0.6s ease-out;
      will-change: opacity;
      cursor: pointer;
    }

    .splash-container.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .scan-line {
      position: absolute;
      top: 38%;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.6) 50%,
        transparent 100%
      );
      transform: translateY(-40px);
      opacity: 0;
      pointer-events: none;
    }

    .scan-line.animate {
      animation: scanSweep 0.8s ease-out 0.6s forwards;
    }

    @keyframes scanSweep {
      0% { transform: translateY(-40px); opacity: 0; }
      20% { opacity: 0.6; }
      100% { transform: translateY(25px); opacity: 0; }
    }

    .micro-dot {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--color-text);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
    }

    .micro-dot.left-dot { top: 38%; left: 25%; }
    .micro-dot.right-dot { top: 38%; right: 25%; }

    .micro-dot.left-dot.animate { animation: dotFlicker 0.6s ease-out 1s forwards; }
    .micro-dot.right-dot.animate { animation: dotFlicker 0.6s ease-out 1.1s forwards; }

    @keyframes dotFlicker {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }

    .title-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .futures-title {
      font-family: "Dancing Script", cursive;
      font-weight: 700;
      font-size: clamp(3.2rem, 16vw, 7.5rem);
      color: var(--color-text);
      letter-spacing: 0.02em;
      text-shadow: 0 0 12px var(--glow-text);
      display: flex;
      gap: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    .futures-letter {
      display: inline-block;
      opacity: 0;
      transform: scale(0.85) translateY(10px);
      filter: blur(2px);
      transition: none;
      will-change: opacity, transform, filter;
    }

    .futures-letter.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
      filter: blur(0);
      transition: opacity 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        transform 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        filter 0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .futures-title.breathing {
      animation: breathe 5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); text-shadow: 0 0 12px var(--glow-text); }
      50% { transform: scale(1.008); text-shadow: 0 0 20px rgba(255, 255, 255, 0.45), 0 0 40px rgba(100, 180, 255, 0.15); }
    }

    .motto {
      margin-top: 2.5rem;
      font-family: "Inter", sans-serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: var(--color-motto);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--accent-border);
      border-radius: 60px;
      padding: 0.5rem 1.2rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease-out, transform 0.6s ease-out;
      user-select: none;
      -webkit-user-select: none;
    }

    .motto.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tap-hint {
      position: absolute;
      bottom: 2.5rem;
      font-family: "Inter", sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.2);
      opacity: 0;
      transition: opacity 1s ease-out;
      user-select: none;
      -webkit-user-select: none;
    }

    .tap-hint.visible {
      opacity: 1;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
    }

    .particle.animate {
      animation: particleFloat 3s ease-out forwards;
    }

    @keyframes particleFloat {
      0% { opacity: 0; transform: translateY(0) scale(0); }
      20% { opacity: 0.6; transform: translateY(-10px) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) scale(0.3); }
    }

    @media (max-width: 480px) {
      .motto { font-size: 0.75rem; margin-top: 2rem; padding: 0.4rem 1rem; }
      .tap-hint { font-size: 0.65rem; bottom: 1.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .futures-letter, .motto, .scan-line, .micro-dot, .particle {
        animation: none !important;
        transition: opacity 0.3s ease-out !important;
      }
      .futures-letter.visible { opacity: 1 !important; transform: none !important; filter: none !important; }
      .motto.visible { opacity: 1 !important; transform: none !important; }
      .futures-title.breathing { animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="splash-container" id="splashContainer">
    <div class="scan-line" id="scanLine"></div>
    <div class="micro-dot left-dot" id="leftDot"></div>
    <div class="micro-dot right-dot" id="rightDot"></div>
    <div id="particlesContainer"></div>

    <div class="title-wrapper">
      <h1 class="futures-title" id="futuresTitle" aria-label="FUTURES">
        <span class="futures-letter" data-delay="0">F</span>
        <span class="futures-letter" data-delay="70">U</span>
        <span class="futures-letter" data-delay="140">T</span>
        <span class="futures-letter" data-delay="210">U</span>
        <span class="futures-letter" data-delay="280">R</span>
        <span class="futures-letter" data-delay="350">E</span>
        <span class="futures-letter" data-delay="420">S</span>
      </h1>
    </div>

    <p class="motto" id="motto">PRICE IS THE ONLY INDICATOR</p>

    <p class="tap-hint" id="tapHint">TAP TO CONTINUE</p>
  </div>

  <script>
    (function () {
      "use strict";

      const container = document.getElementById("splashContainer");
      const letters = document.querySelectorAll(".futures-letter");
      const mottoEl = document.getElementById("motto");
      const scanLine = document.getElementById("scanLine");
      const leftDot = document.getElementById("leftDot");
      const rightDot = document.getElementById("rightDot");
      const titleEl = document.getElementById("futuresTitle");
      const tapHint = document.getElementById("tapHint");
      const particlesContainer = document.getElementById("particlesContainer");

      let hasAnimated = false;
      let soundPlayed = false;

      const cashOutAudio = new Audio("cashout.mp3");
      cashOutAudio.volume = 0.65;
      cashOutAudio.preload = "auto";

      function playCashOutSound() {
        cashOutAudio.currentTime = 0;
        cashOutAudio.play().catch(function (err) {
          console.warn("Audio play blocked:", err);
        });
      }

      function navigateToNext() {
        container.classList.add("fade-out");
        setTimeout(function () {
          window.location.href = "/sign";
        }, 600);
      }

      function animateLetters() {
        letters.forEach(function (letterEl) {
          const delay = parseInt(letterEl.getAttribute("data-delay"), 10);
          setTimeout(function () {
            letterEl.classList.add("visible");
          }, delay);
        });
      }

      function startBreathing() {
        titleEl.classList.add("breathing");
      }

      function revealMotto() {
        mottoEl.classList.add("visible");
      }

      function triggerDecorations() {
        scanLine.classList.add("animate");
        leftDot.classList.add("animate");
        rightDot.classList.add("animate");
        spawnParticles();
      }

      function spawnParticles() {
        const count = 8;
        for (let i = 0; i < count; i++) {
          const particle = document.createElement("div");
          particle.className = "particle";
          particle.style.left = 20 + Math.random() * 60 + "%";
          particle.style.top = 35 + Math.random() * 30 + "%";
          particle.style.animationDelay = 1.2 + Math.random() * 1.5 + "s";
          particlesContainer.appendChild(particle);

          requestAnimationFrame(function () {
            particle.classList.add("animate");
          });

          setTimeout(function () {
            if (particle.parentNode) particle.parentNode.removeChild(particle);
          }, 5000);
        }
      }

      function showTapHint() {
        setTimeout(function () {
          tapHint.classList.add("visible");
        }, 1800);
      }

      function startAnimation() {
        if (hasAnimated) return;
        hasAnimated = true;

        animateLetters();
        setTimeout(triggerDecorations, 500);
        setTimeout(revealMotto, 900);
        setTimeout(startBreathing, 1000);
        showTapHint();
      }

      function handleTap() {
        if (!hasAnimated) return;
        if (soundPlayed) return;
        soundPlayed = true;

        tapHint.classList.remove("visible");
        playCashOutSound();

        setTimeout(navigateToNext, 900);
      }

      container.addEventListener("click", handleTap);
      container.addEventListener("touchstart", handleTap);

      window.addEventListener("load", function () {
        startAnimation();
      });

      window.addEventListener("beforeunload", function () {
        cashOutAudio.pause();
        cashOutAudio.src = "";
      });
    })();
  </script>
</body>
</html>
