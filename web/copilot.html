<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FUTURES – AI Copilot</title>
  <link href="https://fonts.bunny.net/css?family=inter:400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3fc;
      --card-bg: rgba(255, 255, 255, 0.94);
      --card-border: rgba(43, 127, 255, 0.3);
      --text: #0a2540;
      --text-muted: #5f7f9e;
      --text-heading: #0a2540;
      --primary: #2b6ef0;
      --primary-fg: #ffffff;
      --user-bubble: #2b6ef0;
      --user-bubble-text: #ffffff;
      --bot-bubble: #f8fafc;
      --bot-bubble-text: #0a2540;
      --radius: 20px;
      --shadow: 0 10px 30px rgba(0,0,0,0.05);
      --transition: all 0.2s ease;
    }

    [data-theme="dark"] {
      --bg: #050505;
      --card-bg: rgba(15, 15, 15, 0.9);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-muted: #888888;
      --text-heading: #f0f0f0;
      --primary: #ffffff;
      --primary-fg: #000000;
      --user-bubble: #3b82f6;
      --user-bubble-text: #ffffff;
      --bot-bubble: #1e1e1e;
      --bot-bubble-text: #e0e0e0;
      --shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .app-container { 
      width: 100%; 
      max-width: 480px; 
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg);
    }
    
    /* HEADER */
    .header {
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      border-bottom: 1px solid var(--card-border);
      flex-shrink: 0;
      z-index: 10;
    }
    .back-btn {
      background: none; border: none; cursor: pointer; color: var(--text);
      display: flex; align-items: center; gap: 0.25rem; font-weight: 600; font-size: 0.95rem;
    }
    .page-title { font-size: 1.1rem; font-weight: 700; color: var(--text-heading); display: flex; align-items: center; gap: 0.5rem; }
    .theme-toggle {
      width: 36px; height: 36px; background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); transition: var(--transition);
    }
    .theme-toggle:hover { transform: scale(1.05); }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.4;
      position: relative;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .message.bot {
      align-self: flex-start;
      background: var(--bot-bubble);
      color: var(--bot-bubble-text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--card-border);
    }
    .message.user {
      align-self: flex-end;
      background: var(--user-bubble);
      color: var(--user-bubble-text);
      border-bottom-right-radius: 4px;
    }

    .message img.chart-img {
      width: 100%;
      max-width: 250px;
      height: auto;
      border-radius: 8px;
      margin-top: 0.5rem;
      display: block;
      border: 1px solid rgba(0,0,0,0.1);
    }

    .typing-indicator {
      align-self: flex-start;
      background: var(--bot-bubble);
      padding: 0.75rem 1rem;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--card-border);
      display: none;
      gap: 4px;
      width: fit-content;
    }
    .typing-indicator.visible { display: flex; }
    .typing-indicator span {
      width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

    /* SUGGESTIONS */
    .suggestions-wrapper {
      padding: 0.75rem 1rem;
      background: var(--bg);
      flex-shrink: 0;
    }
    .suggestions {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.25rem;
      scrollbar-width: none;
    }
    .suggestions::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: 0.5rem 0.85rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .chip:hover { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }

    /* INPUT AREA */
    .input-area {
      padding: 1rem;
      background: var(--bg);
      border-top: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .input-wrapper {
      flex: 1;
      position: relative;
    }
    .chat-input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: var(--transition);
    }
    .chat-input:focus { outline: none; border-color: var(--primary); }
    .chat-input::placeholder { color: var(--text-muted); opacity: 0.7; }

    .btn-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      color: var(--primary);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
    }
    .btn-icon:hover { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
    .btn-icon.send { background: var(--primary); color: var(--primary-fg); border-color: var(--primary); }
    .btn-icon.send:hover { opacity: 0.9; transform: scale(1.05); }
    .btn-icon:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* HIDDEN */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- HEADER -->
    <header class="header">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <h1 class="page-title"> FUTURES</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg id="iconSun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="iconMoon" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </header>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">
      <div class="message bot">
        👋 Hi, I'm FUTURES. Ask me anything trading related and your account management.
      </div>
      <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- SUGGESTIONS -->
    <div class="suggestions-wrapper">
      <div class="suggestions" id="suggestions">
        <button class="chip" onclick="sendSuggestion('💰 Check my balance')">💰 Balance</button>
        <button class="chip" onclick="sendSuggestion('📊 Recent trades')">📊 Trades</button>
        <button class="chip" onclick="sendSuggestion('🤔 Why did you take the last trade?')">🤔 Last trade</button>
        <button class="chip" onclick="sendSuggestion('📰 Any major news today?')">📰 News</button>
        <button class="chip" onclick="sendSuggestion('🛑 Stop the bot now')">🛑 Stop bot</button>
        <button class="chip" onclick="sendSuggestion('📖 Generate a chart for GBPUSD')"> Chart</button>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <button class="btn-icon" onclick="toggleVoice()" title="Voice Input">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
      </button>
      <div class="input-wrapper">
        <input type="text" class="chat-input" id="chatInput" placeholder="Ask FUTURES..." onkeypress="handleKeyPress(event)" />
      </div>
      <button class="btn-icon send" id="sendBtn" onclick="sendMessage()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>

  <script>
    /**
     * AI AGENT NOTE: AI COPILOT IMPLEMENTATION GUIDE
     * -----------------------------------------------------------------------
     * 1. BACKEND PROXY (Supabase Edge Function):
     *    - NEVER expose DeepSeek API Key in the frontend.
     *    - Create an Edge Function `chat-with-copilot` that accepts:
     *      { message: string, user_id: string }
     *    - Inside Edge Function:
     *      a. Fetch user context from Supabase (balance, bot status, remaining trades, package tier).
     *      b. Construct System Prompt:
     *         "You are FUTURES. Concise (1-2 sentences). Trading context only. 
     *          User Package: [Package Name]. Features: [Full/Limited]."
     *      c. Pass context to DeepSeek API.
     *      d. Handle Function Calling (Tools):
     *         - `stop_bot`: Call POST /api/user/stop.
     *         - `get_chart`: If Package != TRIAL, generate chart image via backend script, upload to Supabase Storage, return URL.
     *      e. Return JSON: { text: string, imageUrl?: string, action?: 'stop_bot' }
     *
     * 2. IMAGE GENERATION (Paid Users Only):
     *    - Check user package tier before allowing chart generation.
     *    - If TRIAL user asks for chart, return text: "Charts are available for SPARK package and above."
     *    - Image display: Use the <img> tag with the returned URL.
     *
     * 3. VOICE INPUT:
     *    - Use Web Speech API (SpeechRecognition) for web prototype.
     *    - In React Native: Use `expo-speech` or `@react-native-voice/voice`.
     *
     * 4. RATE LIMITING:
     *    - Implement client-side debounce or counter to prevent spamming the API.
     *    - Backend should also rate limit per user ID.
     */

    // DOM Elements
    const chatArea = document.getElementById('chatArea');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');
    const themeToggle = document.getElementById('themeToggle');
    const iconSun = document.getElementById('iconSun');
    const iconMoon = document.getElementById('iconMoon');
    const html = document.documentElement;

    // Theme Logic
    themeToggle.addEventListener('click', () => {
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      iconSun.classList.toggle('hidden', !isDark);
      iconMoon.classList.toggle('hidden', isDark);
    });

    // Chat Logic
    function handleKeyPress(e) {
      if (e.key === 'Enter') sendMessage();
    }

    function sendSuggestion(text) {
      chatInput.value = text;
      sendMessage();
    }

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      // Add User Message
      addMessage(text, 'user');
      chatInput.value = '';
      
      // Show Typing Indicator
      typingIndicator.classList.add('visible');
      chatArea.scrollTop = chatArea.scrollHeight;

      // AI AGENT NOTE: Replace mock delay with actual fetch to Edge Function
      // const response = await fetch(SUPABASE_URL + '/functions/v1/chat-with-copilot', { ... });
      
      try {
        // Simulate Network/API Latency
        await new Promise(resolve => setTimeout(resolve, 1500));

        // Mock Response Logic (For Demo)
        let botResponseText = "I'm here to help!";
        let imageUrl = null;

        if (text.toLowerCase().includes('stop')) {
          botResponseText = "Bot stopped. All open positions have been closed.";
        } else if (text.toLowerCase().includes('balance')) {
          botResponseText = "Your current balance is $1,234.56 with $50.00 free margin.";
        } else if (text.toLowerCase().includes('chart') || text.toLowerCase().includes('generate')) {
          botResponseText = "Here is the chart analysis for GBPUSD. The key resistance is at 1.2950.";
          // Placeholder image for chart generation
          imageUrl = "https://placehold.co/400x250/1e3a8a/ffffff?text=GBPUSD+Chart+Analysis";
        } else if (text.toLowerCase().includes('news')) {
          botResponseText = "No high-impact news expected in the next 2 hours. Trading conditions are stable.";
        } else if (text.toLowerCase().includes('trade') || text.toLowerCase().includes('reason')) {
          botResponseText = "The last trade was triggered by a rejection break at the 4H support level, confirmed by bottom-up alignment.";
        } else {
          botResponseText = "I only discuss trading and the FUTURES bot. Please ask about your account, trades, or bot status.";
        }

        // Hide Typing Indicator
        typingIndicator.classList.remove('visible');

        // Add Bot Message
        addMessage(botResponseText, 'bot', imageUrl);

      } catch (error) {
        typingIndicator.classList.remove('visible');
        addMessage("Error connecting to FUTURES Copilot. Please try again.", 'bot');
      }
    }

    function addMessage(text, sender, imageUrl = null) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;
      
      let content = `<span>${text}</span>`;
      if (imageUrl) {
        content += `<img src="${imageUrl}" alt="Chart" class="chart-img" loading="lazy" />`;
      }
      
      msgDiv.innerHTML = content;
      
      // Insert before typing indicator
      chatArea.insertBefore(msgDiv, typingIndicator);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function toggleVoice() {
      // AI AGENT NOTE: Implement SpeechRecognition API here.
      // In React Native, use @react-native-voice/voice.
      alert("Voice input would activate microphone here.");
    }

    function goBack() {
      // navigation.goBack();
      window.history.back();
    }
  </script>
</body>
</html>
