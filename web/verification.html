<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FUTURES – Verify Account</title>
  <link href="https://fonts.bunny.net/css?family=inter:400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3fc;
      --card-bg: rgba(255, 255, 255, 0.94);
      --card-border: rgba(43, 127, 255, 0.3);
      --text: #0a2540;
      --text-muted: #5f7f9e;
      --text-heading: #0a2540;
      --primary: #2b6ef0;
      --primary-fg: #ffffff;
      --success: #2b8c4a;
      --error: #e5484d;
      --input-bg: #f8fafc;
      --border: #e2e8f0;
      --radius: 20px;
      --shadow: 0 10px 30px rgba(0,0,0,0.05);
      --transition: all 0.2s ease;
    }

    [data-theme="dark"] {
      --bg: #050505;
      --card-bg: rgba(15, 15, 15, 0.9);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-muted: #888888;
      --text-heading: #f0f0f0;
      --primary: #ffffff;
      --primary-fg: #000000;
      --success: #22c55e;
      --error: #ef4444;
      --input-bg: #111111;
      --border: #222222;
      --shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
      display: flex;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      position: relative;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .back-btn {
      background: none; border: none; cursor: pointer; color: var(--text);
      display: flex; align-items: center; gap: 0.25rem; font-weight: 600; font-size: 0.95rem;
    }
    .page-title { font-size: 1.25rem; font-weight: 700; color: var(--text-heading); }
    .theme-toggle {
      width: 40px; height: 40px; background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); transition: var(--transition);
    }
    .theme-toggle:hover { transform: scale(1.05); }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .otp-container {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .otp-input {
      width: 44px;
      height: 52px;
      background: var(--input-bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      transition: var(--transition);
      caret-color: var(--primary);
    }
    .otp-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(43, 110, 240, 0.15);
    }
    .otp-input.filled {
      border-color: var(--primary);
      background: rgba(43, 110, 240, 0.05);
    }

    .resend-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .resend-link {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: opacity 0.2s;
    }
    .resend-link:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      color: var(--text-muted);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: var(--primary-fg);
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(43, 110, 240, 0.3);
    }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary.loading .spinner { display: block; }
    .btn-primary.loading .btn-text { display: none; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--primary-fg);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px;
      padding: 0.75rem 1.25rem; box-shadow: var(--shadow); font-size: 0.9rem; font-weight: 500;
      opacity: 0; transition: all 0.3s ease; z-index: 200; pointer-events: none;
    }
    .toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--error); color: var(--error); }

    .hidden { display: none !important; }
    @media (max-width: 400px) {
      .otp-input { width: 38px; height: 48px; font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <h1 class="page-title">Verify Account</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg id="iconSun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="iconMoon" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </header>

    <main>
      <!-- EMAIL VERIFICATION SECTION -->
      <div class="card" id="emailSection">
        <div class="section-title">📧 Email Verification</div>
        <p class="section-desc">
          We've sent a 6-digit code to your email. Please check your inbox (and spam folder) and enter the code below.
        </p>
        <div class="otp-container" id="emailOtpContainer">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="0" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="1" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="2" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="3" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="4" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="5" />
        </div>
        <div class="resend-row">
          <button class="resend-link" id="resendEmailBtn" onclick="handleResendEmail()">Resend Code <span id="emailTimer">(60s)</span></button>
        </div>
      </div>

      <div class="divider"></div>

      <!-- PHONE VERIFICATION SECTION -->
      <div class="card" id="phoneSection">
        <div class="section-title">📱 Phone Verification</div>
        <p class="section-desc">
          Enter the 6-digit code sent via SMS to your phone number.
        </p>
        <div class="otp-container" id="phoneOtpContainer">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="0" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="1" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="2" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="3" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="4" />
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="5" />
        </div>
        <div class="resend-row">
          <button class="resend-link" id="resendPhoneBtn" onclick="handleResendPhone()">Resend Code <span id="phoneTimer">(60s)</span></button>
        </div>
        
        <button class="btn-primary" id="verifyBtn" onclick="handleVerify()">
          <span class="spinner"></span>
          <span class="btn-text">Verify & Continue</span>
        </button>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /**
     * AI AGENT NOTE: VERIFICATION SCREEN - PRODUCTION IMPLEMENTATION GUIDE
     * -----------------------------------------------------------------------
     * 1. SUPABASE CONFIGURATION:
     *    - Go to Supabase Dashboard → Authentication → Providers → Email.
     *    - Enable "Secure Email Change" and ensure "User confirmation required" is ON.
     *    - IMPORTANT: Configure the "Confirm signup" email template to display the Token.
     *      In the Email Template editor, use {{ .Token }} to show the 6-digit code instead of just a link.
     *      Example HTML: "Your verification code is: <strong>{{ .Token }}</strong>"
     *    - Phone: Ensure Phone provider is enabled and SMS provider (e.g., Twilio) is configured.
     *      Set OTP length to 6 digits and expiry to 60-120 seconds.
     *
     * 2. FRONTEND STATE MANAGEMENT:
     *    - Store user's email and phone from the previous Sign Up screen (passed via navigation params or global state).
     *    - This screen requires BOTH verifications to be successful before proceeding.
     *    - UI tracks which input group (Email/Phone) is complete.
     *
     * 3. API CALLS:
     *    - Email OTP:
     *      const { data, error } = await supabase.auth.verifyOtp({
     *        email: userEmail,
     *        token: emailCode,
     *        type: 'email' // or 'signup' depending on Supabase version
     *      });
     *    - Phone OTP:
     *      const { data, error } = await supabase.auth.verifyOtp({
     *        phone: fullPhoneNumber,
     *        token: phoneCode,
     *        type: 'sms'
     *      });
     *    - On success for both: Navigation to MT5 Connection Screen.
     *      Use navigation.replace('MT5Connect') to prevent back-navigation to this screen.
     *
     * 4. RESEND LOGIC:
     *    - Implement a 60-second cooldown timer to prevent abuse.
     *    - API: supabase.auth.resend({ email: userEmail, type: 'signup' })
     *    - API: supabase.auth.resend({ phone: fullPhoneNumber, type: 'signup' })
     *
     * 5. UX IMPROVEMENTS:
     *    - Auto-focus first input of each section on load.
     *    - Support paste events (user pastes 6 digits at once).
     *    - Clear inputs on error to allow easy retry.
     *    - Visual feedback: Green border/check when input is filled.
     */

    // State
    const state = {
      email: 'trader@example.com', // Placeholder - get from sign up flow
      phone: '+256704xxxxxx',   // Placeholder - get from sign up flow
      emailVerified: false,
      phoneVerified: false,
      emailTimer: 60,
      phoneTimer: 60,
      emailInterval: null,
      phoneInterval: null
    };

    // DOM References
    const themeToggle = document.getElementById('themeToggle');
    const iconSun = document.getElementById('iconSun');
    const iconMoon = document.getElementById('iconMoon');
    const html = document.documentElement;
    const verifyBtn = document.getElementById('verifyBtn');
    const toast = document.getElementById('toast');
    const resendEmailBtn = document.getElementById('resendEmailBtn');
    const emailTimerSpan = document.getElementById('emailTimer');
    const resendPhoneBtn = document.getElementById('resendPhoneBtn');
    const phoneTimerSpan = document.getElementById('phoneTimer');

    // Initialize
    function init() {
      checkTheme();
      setupOtpInputs('emailOtpContainer', (code) => verifySingle('email', code));
      setupOtpInputs('phoneOtpContainer', (code) => verifySingle('phone', code));
      startTimer('email');
      startTimer('phone');
      
      // Focus first input of email
      const firstEmailInput = document.querySelector('#emailOtpContainer input');
      if (firstEmailInput) firstEmailInput.focus();
    }

    function checkTheme() {
      const isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        iconSun.classList.add('hidden');
        iconMoon.classList.remove('hidden');
      } else {
        iconSun.classList.remove('hidden');
        iconMoon.classList.add('hidden');
      }
    }

    themeToggle.addEventListener('click', () => {
      const isDark = html.getAttribute('data-theme') === 'light';
      html.setAttribute('data-theme', isDark ? 'dark' : 'light');
      iconSun.classList.toggle('hidden', !isDark);
      iconMoon.classList.toggle('hidden', isDark);
    });

    // OTP Input Logic
    function setupOtpInputs(containerId, onComplete) {
      const container = document.getElementById(containerId);
      const inputs = container.querySelectorAll('.otp-input');

      inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
          const val = e.target.value.replace(/[^0-9]/g, '');
          e.target.value = val;
          if (val) {
            e.target.classList.add('filled');
            if (index < inputs.length - 1) {
              inputs[index + 1].focus();
            } else {
              onComplete(getOtpValue(inputs));
            }
          } else {
            e.target.classList.remove('filled');
          }
        });

        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && index > 0) {
            inputs[index - 1].focus();
            inputs[index - 1].value = '';
            inputs[index - 1].classList.remove('filled');
          }
        });

        input.addEventListener('paste', (e) => {
          e.preventDefault();
          const pasteData = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, 6);
          pasteData.split('').forEach((char, i) => {
            if (inputs[i]) {
              inputs[i].value = char;
              inputs[i].classList.add('filled');
            }
          });
          if (pasteData.length > 0) {
            const focusIndex = Math.min(pasteData.length, inputs.length - 1);
            inputs[focusIndex].focus();
          }
          onComplete(getOtpValue(inputs));
        });
      });
    }

    function getOtpValue(inputs) {
      return Array.from(inputs).map(i => i.value).join('');
    }

    function clearOtpInputs(containerId) {
      const inputs = document.querySelectorAll(`#${containerId} .otp-input`);
      inputs.forEach(i => { i.value = ''; i.classList.remove('filled'); });
      inputs[0].focus();
    }

    // Timer Logic
    function startTimer(type) {
      const btn = type === 'email' ? resendEmailBtn : resendPhoneBtn;
      const span = type === 'email' ? emailTimerSpan : phoneTimerSpan;
      const intervalKey = type === 'email' ? 'emailInterval' : 'phoneInterval';
      
      state[type === 'email' ? 'emailTimer' : 'phoneTimer'] = 60;
      btn.disabled = true;
      span.textContent = '(60s)';
      
      clearInterval(state[intervalKey]);
      state[intervalKey] = setInterval(() => {
        const currentTimer = type === 'email' ? 'emailTimer' : 'phoneTimer';
        state[currentTimer]--;
        span.textContent = `(${state[currentTimer]}s)`;
        if (state[currentTimer] <= 0) {
          clearInterval(state[intervalKey]);
          btn.disabled = false;
          span.textContent = '';
        }
      }, 1000);
    }

    // Verification Handlers
    async function verifySingle(type, code) {
      if (code.length !== 6) return;

      // Mock delay for UI
      showToast(`Verifying ${type}...`, 'success');
      await new Promise(r => setTimeout(r, 800));

      // AI AGENT NOTE: CALL SUPABASE VERIFY OTP
      // const { data, error } = await supabase.auth.verifyOtp({
      //   [type === 'email' ? 'email' : 'phone']: type === 'email' ? state.email : state.phone,
      //   token: code,
      //   type: type === 'email' ? 'email' : 'sms'
      // });
      // if (error) { showToast(error.message, 'error'); clearOtpInputs(type + 'OtpContainer'); return; }

      if (type === 'email') {
        state.emailVerified = true;
        showToast('Email verified!', 'success');
      } else {
        state.phoneVerified = true;
        showToast('Phone verified!', 'success');
      }

      checkAllVerified();
    }

    function checkAllVerified() {
      if (state.emailVerified && state.phoneVerified) {
        handleFinalVerify();
      }
    }

    async function handleFinalVerify() {
      if (verifyBtn.disabled) return;
      
      verifyBtn.disabled = true;
      verifyBtn.classList.add('loading');

      try {
        // AI AGENT NOTE: FINAL CHECK AND NAVIGATION
        // Ensure session is valid before navigating.
        // const {  { session } } = await supabase.auth.getSession();
        // if (!session) throw new Error('Session expired. Please login again.');
        
        await new Promise(r => setTimeout(r, 1000)); // Mock network
        
        showToast('✓ Account fully verified!', 'success');
        
        setTimeout(() => {
          // navigation.replace('MT5Connect');
          alert('Redirecting to MT5 Connection...');
        }, 800);

      } catch (err) {
        console.error(err);
        showToast(err.message || 'Verification failed. Please try again.', 'error');
        verifyBtn.disabled = false;
      } finally {
        verifyBtn.classList.remove('loading');
      }
    }

    async function handleResendEmail() {
      showToast('Sending new email code...', 'success');
      // AI AGENT NOTE: supabase.auth.resend({ email: state.email, type: 'signup' });
      startTimer('email');
    }

    async function handleResendPhone() {
      showToast('Sending new SMS code...', 'success');
      // AI AGENT NOTE: supabase.auth.resend({ phone: state.phone, type: 'signup' });
      startTimer('phone');
    }

    function showToast(msg, type) {
      toast.textContent = msg;
      toast.className = `toast visible ${type}`;
      setTimeout(() => { toast.classList.remove('visible'); }, 3000);
    }

    function goBack() {
      window.history.back();
    }

    init();
  </script>
</body>
</html>
