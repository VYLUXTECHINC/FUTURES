<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FUTURES – Accountability</title>
  <link href="https://fonts.bunny.net/css?family=inter:400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3fc;
      --card-bg: rgba(255, 255, 255, 0.94);
      --card-border: rgba(43, 127, 255, 0.3);
      --text: #0a2540;
      --text-muted: #5f7f9e;
      --text-heading: #0a2540;
      --primary: #2b6ef0;
      --primary-fg: #ffffff;
      --profit: #2b8c4a;
      --loss: #e5484d;
      --input-bg: #f8fafc;
      --border: #e2e8f0;
      --radius: 20px;
      --shadow: 0 10px 30px rgba(0,0,0,0.05);
      --transition: all 0.2s ease;
    }

    [data-theme="dark"] {
      --bg: #050505;
      --card-bg: rgba(15, 15, 15, 0.9);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-muted: #888888;
      --text-heading: #f0f0f0;
      --primary: #ffffff;
      --primary-fg: #000000;
      --profit: #22c55e;
      --loss: #ef4444;
      --input-bg: #111111;
      --border: #222222;
      --shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
      display: flex;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    .app-container { width: 100%; max-width: 580px; position: relative; }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .back-btn {
      background: none; border: none; cursor: pointer; color: var(--text);
      display: flex; align-items: center; gap: 0.25rem; font-weight: 600; font-size: 0.95rem;
    }
    .page-title { font-size: 1.25rem; font-weight: 700; color: var(--text-heading); }
    .theme-toggle {
      width: 40px; height: 40px; background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); transition: var(--transition);
    }
    .theme-toggle:hover { transform: scale(1.05); }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      margin-bottom: 1rem;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .form-select, .btn-filter {
      padding: 0.6rem 0.85rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .form-select:focus { outline: none; border-color: var(--primary); }
    .btn-filter {
      display: flex; align-items: center; gap: 0.4rem; font-weight: 600;
    }
    .btn-filter:hover { background: var(--card-border); }
    .btn-filter svg { width: 16px; height: 16px; }

    /* TRADE TABLE */
    .table-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
    }
    .trade-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 500px;
    }
    .trade-table th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      white-space: nowrap;
    }
    .trade-table td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .trade-table tr:last-child td { border-bottom: none; }
    .trade-table tr:hover td { background: var(--card-border); }
    
    .pnl-profit { color: var(--profit); font-weight: 600; }
    .pnl-loss { color: var(--loss); font-weight: 600; }
    
    .trade-type {
      display: inline-block;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .trade-type.buy { background: rgba(43, 140, 74, 0.15); color: var(--profit); }
    .trade-type.sell { background: rgba(229, 72, 77, 0.15); color: var(--loss); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
      display: none;
    }
    .empty-state.visible { display: block; }
    .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.5; }

    /* FOOTER */
    .footer-note {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 1rem;
      padding: 0.5rem;
      background: var(--card-bg);
      border-radius: 8px;
    }

    /* TOAST */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px;
      padding: 0.75rem 1.25rem; box-shadow: var(--shadow); font-size: 0.9rem; font-weight: 500;
      opacity: 0; transition: all 0.3s ease; z-index: 200; pointer-events: none;
    }
    .toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--profit); color: var(--profit); }
    .toast.error { border-color: var(--loss); color: var(--loss); }

    .hidden { display: none !important; }
    @media (max-width: 480px) {
      .filter-bar { flex-direction: column; }
      .filter-bar > * { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <h1 class="page-title">Accountability</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg id="iconSun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="iconMoon" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </header>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <select class="form-select" id="dateRangeSelect" onchange="handleFilterChange()">
        <option value="7">Last 7 days</option>
        <option value="30" selected>Last 30 days</option>
        <option value="90">Last 90 days</option>
        <option value="all">All time</option>
      </select>
      <button class="btn-filter" onclick="handleExport('csv')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        CSV
      </button>
      <button class="btn-filter" onclick="handleExport('pdf')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
        PDF
      </button>
    </div>

    <!-- TRADE LIST CARD -->
    <div class="card">
      <div class="table-container">
        <table class="trade-table" id="tradeTable">
          <thead>
            <tr>
              <th>Pair</th>
              <th>Type</th>
              <th>Lots</th>
              <th>Entry</th>
              <th>Exit</th>
              <th>P&L</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="tradesBody">
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📉</div>
        <p>No trades found for this period.</p>
        <p style="font-size: 0.8rem; margin-top: 0.5rem;">Start the bot to see trade history.</p>
      </div>
    </div>

    <div class="footer-note">
      📁 Last 30 days of trades cached offline.
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /**
     * AI AGENT NOTE: ACCOUNTABILITY SCREEN - PRODUCTION IMPLEMENTATION GUIDE
     * -----------------------------------------------------------------------
     * 1. DATA FETCHING & PAGINATION:
     *    - Use Supabase query: `.from('trades').select('*').eq('user_id', userId)`
     *    - Filter by date range: `.gte('closed_at', startDate)`
     *    - Order: `.order('closed_at', { ascending: false })`
     *    - Implement pagination (limit 50 per load) with "Load More" button or infinite scroll.
     *    - The `dateRangeSelect` value (7, 30, 90, all) maps to specific date objects.
     * 
     * 2. OFFLINE CACHE:
     *    - Use AsyncStorage (React Native) or IndexedDB (Web) to store fetched trades.
     *    - Key: `trades_cache_${userId}`
     *    - On load: Check network. If offline, load from cache immediately.
     *    - If online: Fetch fresh data, update cache, update UI.
     *    - Show "Offline – showing cached data" banner if no network.
     * 
     * 3. EXPORT LOGIC:
     *    - CSV: Convert JSON array to CSV string. Use 'Blob' and 'URL.createObjectURL' to download.
     *    - PDF: Use 'jspdf' + 'jspdf-autotable'. Generate a clean, printable table.
     *    - For large exports (>500 rows), offload to a backend edge function to generate the file and return a signed URL.
     * 
     * 4. SECURITY:
     *    - RLS Policy: `CREATE POLICY "Users view own trades" ON trades FOR SELECT USING (auth.uid() = user_id);`
     *    - Never expose other users' trade data.
     * 
     * 5. UI STATES:
     *    - Loading: Show skeleton rows or spinner in the table body.
     *    - Empty: Show `#emptyState` div if array length is 0.
     *    - Error: Show a toast with "Failed to load trades. Retry?"
     */

    // Mock Data
    const MOCK_TRADES = [
      { pair: 'GBPUSD', type: 'BUY', lots: 0.05, entry: 1.2750, exit: 1.2815, pnl: 12.30, time: '2026-05-06T14:32:00' },
      { pair: 'GBPJPY', type: 'SELL', lots: 0.02, entry: 186.50, exit: 186.10, pnl: -5.20, time: '2026-05-06T13:15:00' },
      { pair: 'GBPUSD', type: 'BUY', lots: 0.08, entry: 1.2680, exit: 1.2720, pnl: 8.40, time: '2026-05-06T11:07:00' },
      { pair: 'GBPJPY', type: 'BUY', lots: 0.04, entry: 185.20, exit: 185.50, pnl: 2.10, time: '2026-05-05T09:45:00' },
      { pair: 'GBPUSD', type: 'SELL', lots: 0.06, entry: 1.2710, exit: 1.2650, pnl: 15.00, time: '2026-05-04T16:20:00' },
      { pair: 'GBPJPY', type: 'SELL', lots: 0.03, entry: 187.00, exit: 187.45, pnl: -8.50, time: '2026-05-04T10:30:00' },
    ];

    let currentTrades = MOCK_TRADES;
    const toast = document.getElementById('toast');
    const tradesBody = document.getElementById('tradesBody');
    const emptyState = document.getElementById('emptyState');

    function renderTrades(trades) {
      if (trades.length === 0) {
        tradesBody.innerHTML = '';
        emptyState.classList.add('visible');
        return;
      }
      
      emptyState.classList.remove('visible');
      tradesBody.innerHTML = trades.map(t => {
        const date = new Date(t.time);
        const formattedDate = `${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}, ${date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false })}`;
        const isProfit = t.pnl >= 0;
        const pnlClass = isProfit ? 'pnl-profit' : 'pnl-loss';
        const pnlStr = `${isProfit ? '+' : ''}$${t.pnl.toFixed(2)}`;
        const typeClass = t.type === 'BUY' ? 'buy' : 'sell';
        
        return `
          <tr>
            <td><strong>${t.pair}</strong></td>
            <td><span class="trade-type ${typeClass}">${t.type}</span></td>
            <td>${t.lots.toFixed(2)}</td>
            <td>${t.entry.toFixed(5)}</td>
            <td>${t.exit.toFixed(5)}</td>
            <td class="${pnlClass}">${pnlStr}</td>
            <td>${formattedDate}</td>
          </tr>
        `;
      }).join('');
    }

    function handleFilterChange() {
      const range = document.getElementById('dateRangeSelect').value;
      // AI AGENT NOTE: Filter currentTrades based on range.
      // In production, trigger a new fetch with `gte('closed_at', calculateStartDate(range))`.
      showToast(`Filter applied: ${range} days`, 'success');
      renderTrades(currentTrades);
    }

    function handleExport(format) {
      // AI AGENT NOTE: Implementation for export.
      // CSV: Convert currentTrades to CSV string, create Blob, trigger download.
      // PDF: Use jspdf-autotable to generate PDF from currentTrades.
      // Backend approach: Call edge function `/api/export?format=${format}&range=${range}`.
      
      showToast(`${format.toUpperCase()} export started...`, 'success');
      
      setTimeout(() => {
        showToast(`✓ ${format.toUpperCase()} file downloaded`, 'success');
      }, 1500);
    }

    function showToast(msg, type) {
      toast.textContent = msg;
      toast.className = `toast visible ${type}`;
      setTimeout(() => { toast.classList.remove('visible'); }, 3000);
    }

    function goBack() { window.history.back(); }

    // Theme Toggle Logic
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const iconSun = document.getElementById('iconSun');
    const iconMoon = document.getElementById('iconMoon');

    themeToggle.addEventListener('click', () => {
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      iconSun.classList.toggle('hidden', !isDark);
      iconMoon.classList.toggle('hidden', isDark);
    });

    // Initialize
    renderTrades(currentTrades);
  </script>
</body>
</html>
