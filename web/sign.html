<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FUTURES – Login</title>
  <link href="https://fonts.bunny.net/css?family=inter:400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --surface-hover: #111111;
      --border: #1a1a1a;
      --border-focus: #333333;
      --text: #ffffff;
      --text-muted: #888888;
      --text-inverse: #000000;
      --primary: #ffffff;
      --primary-fg: #000000;
      --input-bg: #050505;
      --radius: 12px;
      --transition: all 0.2s ease;
      --shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f8f9fa;
      --surface-hover: #e9ecef;
      --border: #dee2e6;
      --border-focus: #adb5bd;
      --text: #111111;
      --text-muted: #6c757d;
      --text-inverse: #ffffff;
      --primary: #000000;
      --primary-fg: #ffffff;
      --input-bg: #ffffff;
      --shadow: 0 20px 50px rgba(0,0,0,0.08);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: var(--shadow);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .logo-section { text-align: center; margin-bottom: 1.5rem; }
    .logo-title { font-family: 'Dancing Script', cursive; font-size: 3rem; font-weight: 700; margin-bottom: 0.25rem; }
    .logo-motto { font-size: 0.8rem; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.4rem; }
    .form-input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: var(--transition);
    }
    .form-input:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 2px rgba(128,128,128,0.1); }
    .form-input::placeholder { color: var(--text-muted); opacity: 0.6; }
    .btn-primary {
      width: 100%; padding: 1rem; background: var(--primary); color: var(--primary-fg);
      border: none; border-radius: var(--radius); font-family: 'Inter', sans-serif;
      font-weight: 700; font-size: 1rem; cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 0.75rem;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(128,128,128,0.2); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -0.25rem;
      margin-bottom: 1rem;
    }
    .forgot-link {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: var(--text); }
    .form-footer {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }
    .form-footer a {
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .form-footer a:hover { text-decoration: underline; }
    .error-text {
      color: #ff4444;
      font-size: 0.85rem;
      text-align: center;
      margin-bottom: 0.75rem;
      min-height: 1.2em;
    }
    @media (max-width: 480px) {
      .auth-card { padding: 1.5rem; }
      .logo-title { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="auth-card">
      <div class="logo-section">
        <h1 class="logo-title">FUTURES</h1>
        <p class="logo-motto">Price is the only Indicator</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="trader@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required minlength="6" />
        </div>
        <div class="forgot-row">
          <a class="forgot-link" href="forgot_password.html">Forgot password?</a>
        </div>
        <p class="error-text" id="loginError"></p>
        <button type="submit" class="btn-primary" id="loginBtn">Login</button>
        <div class="form-footer">
          Don't have an account? <a href="signup.html">Create new account</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    let supabase = null;

    async function initSupabase() {
      try {
        const res = await fetch('/api/config');
        const config = await res.json();
        supabase = window.supabase.createClient(config.supabase_url, config.supabase_key);
      } catch (e) {
        console.error('Failed to init Supabase:', e);
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      if (!supabase) {
        errorEl.textContent = 'Connecting... please retry.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';
      errorEl.textContent = '';

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Login';
        return;
      }

      window.location.href = 'dasboard.html';
    });

    initSupabase();

    const themeToggle = document.createElement('button');
    themeToggle.className = 'theme-toggle';
    themeToggle.style.cssText = 'position:absolute;top:1.5rem;right:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);z-index:10;';
    themeToggle.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
    document.querySelector('.app-container').prepend(themeToggle);
    themeToggle.addEventListener('click', () => {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      themeToggle.innerHTML = isDark
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
    });
  </script>
</body>
</html>
