<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FUTURES – Login</title>
  <link href="https://fonts.bunny.net/css?family=inter:400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000;
      --text: #fff;
      --muted: #888;
      --border: #1a1a1a;
      --surface: #0a0a0a;
      --input-bg: #050505;
      --radius: 12px;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 3rem;
      font-weight: 700;
    }
    .logo p {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 0.3rem;
    }
    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      font-weight: 500;
    }
    .field input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .field input:focus {
      outline: none;
      border-color: #333;
    }
    .field input::placeholder { color: #555; }
    .forgot {
      text-align: right;
      margin-bottom: 1.2rem;
    }
    .forgot a {
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
    }
    .forgot a:hover { color: var(--text); }
    .error {
      color: #ff4444;
      font-size: 0.82rem;
      text-align: center;
      margin-bottom: 0.75rem;
      min-height: 1.2em;
    }
    .btn {
      width: 100%;
      padding: 0.9rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .footer {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--muted);
    }
    .footer a {
      color: var(--text);
      font-weight: 600;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      .logo h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>FUTURES</h1>
      <p>Price is the only Indicator</p>
    </div>
    <form id="loginForm">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="trader@example.com" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required minlength="6" />
      </div>
      <div class="forgot">
        <a href="forgot_password.html">Forgot password?</a>
      </div>
      <p class="error" id="loginError"></p>
      <button type="submit" class="btn" id="loginBtn">Login</button>
      <div class="footer">
        Don't have an account? <a href="signup.html">Create new account</a>
      </div>
    </form>
  </div>

  <script>
    let supabase = null;
    async function initSupabase() {
      try {
        const res = await fetch('/api/config');
        const config = await res.json();
        supabase = window.supabase.createClient(config.supabase_url, config.supabase_key);
      } catch (e) { console.error(e); }
    }
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');
      if (!supabase) { errorEl.textContent = 'Connecting... please retry.'; return; }
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      errorEl.textContent = '';
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errorEl.textContent = error.message;
        btn.disabled = false;
        btn.textContent = 'Login';
        return;
      }
      window.location.href = 'dasboard.html';
    });
    initSupabase();
  </script>
</body>
</html>
