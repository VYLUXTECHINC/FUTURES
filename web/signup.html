<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <title>FUTURES – Create Account</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dancing-script@5.0.18/index.css" />
  <link href="https://fonts.bunny.net/css?family=inter:400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000;
      --text: #fff;
      --muted: #888;
      --border: #1a1a1a;
      --surface: #0a0a0a;
      --input-bg: #050505;
      --radius: 12px;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; font-weight: 700; }
    .logo p { font-size: 0.75rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-top: 0.3rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 500; }
    .field input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .field input:focus { outline: none; border-color: #333; }
    .field input::placeholder { color: #555; }
    .btn {
      width: 100%;
      padding: 0.9rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .footer {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--muted);
    }
    .footer a { color: var(--text); font-weight: 600; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .error { color: #ff4444; font-size: 0.82rem; text-align: center; margin-bottom: 0.75rem; min-height: 1.2em; }
    .success { color: #44ff88; font-size: 0.82rem; text-align: center; margin-bottom: 0.75rem; min-height: 1.2em; }
    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      .logo h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>FUTURES</h1>
      <p>Price is the only Indicator</p>
    </div>

    <form id="signupForm">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="suName" placeholder="Future Trader" required />
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="suEmail" placeholder="trader@example.com" required />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="suPassword" placeholder="Min. 6 characters" required minlength="6" />
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="suConfirmPassword" placeholder="••••••••" required minlength="6" />
      </div>
      <p class="error" id="signupError"></p>
      <p class="success" id="signupSuccess"></p>
      <button type="submit" class="btn" id="signupBtn">Create Account</button>
      <div class="footer">
        Already have an account? <a href="/sign">Login</a>
      </div>
    </form>
  </div>

  <script>
    let supabase = null;
    async function initSupabase() {
      try {
        const res = await fetch('/api/config');
        const config = await res.json();
        supabase = window.supabase.createClient(config.supabase_url, config.supabase_key);
      } catch (e) { console.error(e); }
    }
    document.getElementById('signupForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const name = document.getElementById('suName').value;
      const email = document.getElementById('suEmail').value;
      const password = document.getElementById('suPassword').value;
      const confirm = document.getElementById('suConfirmPassword').value;
      const errorEl = document.getElementById('signupError');
      const successEl = document.getElementById('signupSuccess');
      const btn = document.getElementById('signupBtn');
      errorEl.textContent = '';
      successEl.textContent = '';
      if (password !== confirm) { errorEl.textContent = 'Passwords do not match.'; return; }
      if (!supabase) { errorEl.textContent = 'Connecting... please retry.'; return; }
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { display_name: name } }
      });
      if (error) { errorEl.textContent = error.message; btn.disabled = false; btn.textContent = 'Create Account'; return; }
      if (data?.user?.identities?.length === 0) { errorEl.textContent = 'An account with this email already exists.'; btn.disabled = false; btn.textContent = 'Create Account'; return; }
      successEl.textContent = 'Account created! Check your email for confirmation.';
      btn.textContent = 'Account created!';
      setTimeout(() => { window.location.href = '/verification'; }, 2000);
    });
    initSupabase();
  </script>
</body>
</html>
