<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FUTURES – Support</title>
  <link href="https://fonts.bunny.net/css?family=inter:400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef3fc;
      --card-bg: rgba(255, 255, 255, 0.94);
      --card-border: rgba(43, 127, 255, 0.3);
      --text: #0a2540;
      --text-muted: #5f7f9e;
      --text-heading: #0a2540;
      --primary: #2b6ef0;
      --primary-fg: #ffffff;
      --success: #2b8c4a;
      --error: #e5484d;
      --input-bg: #f8fafc;
      --border: #e2e8f0;
      --radius: 20px;
      --shadow: 0 10px 30px rgba(0,0,0,0.05);
      --transition: all 0.2s ease;
    }

    [data-theme="dark"] {
      --bg: #050505;
      --card-bg: rgba(15, 15, 15, 0.9);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-muted: #888888;
      --text-heading: #f0f0f0;
      --primary: #ffffff;
      --primary-fg: #000000;
      --success: #22c55e;
      --error: #ef4444;
      --input-bg: #111111;
      --border: #222222;
      --shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
      display: flex;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      flex-shrink: 0;
    }
    .back-btn {
      background: none; border: none; cursor: pointer; color: var(--text);
      display: flex; align-items: center; gap: 0.25rem; font-weight: 600; font-size: 0.95rem;
    }
    .page-title { font-size: 1.25rem; font-weight: 700; color: var(--text-heading); }
    .theme-toggle {
      width: 40px; height: 40px; background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); transition: var(--transition);
    }
    .theme-toggle:hover { transform: scale(1.05); }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .card-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Form Elements */
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.4rem; }
    .form-input, .form-textarea {
      width: 100%;
      padding: 0.85rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: var(--transition);
    }
    .form-textarea { min-height: 100px; resize: vertical; }
    .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--primary); }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); opacity: 0.6; }

    .file-upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.75rem;
      background: var(--input-bg);
      border: 1px dashed var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .file-upload-btn:hover { border-color: var(--primary); color: var(--primary); }

    .btn-primary {
      width: 100%;
      padding: 0.9rem;
      background: var(--primary);
      color: var(--primary-fg);
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(43, 110, 240, 0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Contact Info */
    .contact-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: var(--transition);
    }
    .contact-row:last-child { border-bottom: none; }
    .contact-row:hover { color: var(--primary); }
    .contact-icon { font-size: 1.2rem; width: 24px; text-align: center; }
    .contact-text { font-size: 0.95rem; font-weight: 500; }

    /* Academy Promo */
    .promo-card {
      background: linear-gradient(135deg, rgba(43, 110, 240, 0.1), rgba(43, 110, 240, 0.05));
      border: 1px solid var(--primary);
    }
    [data-theme="dark"] .promo-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
    }
    .promo-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .promo-desc { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.75rem; line-height: 1.4; }
    .promo-link {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    /* FAQ Accordion */
    .faq-item { border-bottom: 1px solid var(--border); }
    .faq-item:last-child { border-bottom: none; }
    .faq-question {
      width: 100%;
      background: none;
      border: none;
      padding: 0.75rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      gap: 1rem;
    }
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .faq-item.open .faq-answer { max-height: 200px; padding-bottom: 0.75rem; }
    .faq-item.open .faq-chevron { transform: rotate(180deg); }
    .faq-chevron { transition: transform 0.3s ease; }

    /* Toast */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px;
      padding: 0.75rem 1.25rem; box-shadow: var(--shadow); font-size: 0.9rem; font-weight: 500;
      opacity: 0; transition: all 0.3s ease; z-index: 200; pointer-events: none;
    }
    .toast.visible { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--error); color: var(--error); }

    .hidden { display: none !important; }
    @media (max-width: 480px) {
      .card { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- HEADER -->
    <header class="header">
      <button class="back-btn" onclick="goBack()">← Back</button>
      <h1 class="page-title">Support</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg id="iconSun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="iconMoon" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </header>

    <!-- REPORT AN ISSUE CARD -->
    <div class="card">
      <div class="card-title">📝 Report an Issue</div>
      <form id="issueForm" onsubmit="handleIssueSubmit(event)">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" class="form-input" id="issueTitle" placeholder="Brief description of the issue" required maxlength="100" />
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea class="form-textarea" id="issueDesc" placeholder="Please provide details..." required maxlength="1000"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Screenshot (Optional)</label>
          <label class="file-upload-btn">
            <input type="file" id="issueFile" accept="image/*" style="display: none" onchange="handleFileSelect(this)" />
            <span>📷 Upload Image</span>
            <span id="fileName" style="color: var(--primary);"></span>
          </label>
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">
          <span class="btn-text">Submit Issue</span>
        </button>
      </form>
    </div>

    <!-- CONTACT INFO CARD -->
    <div class="card">
      <div class="card-title">📞 Contact Us</div>
      <div class="contact-row" onclick="handleContact('email')">
        <span class="contact-icon">✉️</span>
        <span class="contact-text">support@futuretraders.com</span>
      </div>
      <div class="contact-row" onclick="handleContact('whatsapp')">
        <span class="contact-icon">📱</span>
        <span class="contact-text">@+256704909060</span>
      </div>
    </div>

    <!-- ACADEMY PROMO CARD -->
    <div class="card promo-card">
      <div class="card-title">🎓 Future Traders Academy</div>
      <p class="promo-desc">Master price action trading with our premium mentorship program. Learn the secrets behind the FUTURES bot.</p>
      <a href="#" class="promo-link" onclick="handleAcademy(event)">Learn more →</a>
    </div>

    <!-- FAQ CARD -->
    <div class="card">
      <div class="card-title">❓ Frequently Asked Questions</div>
      <div id="faqList">
        <!-- Populated by JS -->
      </div>
    </div>

    <p style="text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 1rem;">
      © FUTURES – VYLUX TECH INC.
    </p>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /**
     * AI AGENT NOTE: SUPPORT SCREEN - PRODUCTION IMPLEMENTATION GUIDE
     * -----------------------------------------------------------------------
     * 1. ISSUE SUBMISSION:
     *    - Use Supabase Storage bucket 'support-screenshots' for image uploads.
     *    - Call Edge Function 'submit-support-ticket' with:
     *      { title, description, screenshot_url, user_id }
     *    - Edge Function logic:
     *      a. Validate input.
     *      b. Insert into 'support_tickets' table (RLS enabled).
     *      c. Send notification to Telegram Admin Bot (via Telegram API).
     *      d. Return success.
     * 
     * 2. TELEGRAM INTEGRATION:
     *    - Store Telegram Bot Token and Admin Chat ID in Supabase Secrets.
     *    - Edge Function sends message: "🚨 New Ticket: {title} from User {user_id}"
     * 
     * 3. CONTACT LINKS:
     *    - Email: Use `mailto:support@futuresbot.ug`
     *    - Telegram: Use `tg://resolve?domain=FUTURES_Support` (fallback to https://t.me/FUTURES_Support)
     * 
     * 4. ACADEMY LINK:
     *    - Open external URL: `https://futurestradersacademy.com` (or actual link) using `Linking.openURL` (React Native).
     */

    // DOM References
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const iconSun = document.getElementById('iconSun');
    const iconMoon = document.getElementById('iconMoon');
    const toast = document.getElementById('toast');
    const issueForm = document.getElementById('issueForm');
    const submitBtn = document.getElementById('submitBtn');
    const faqList = document.getElementById('faqList');

    // FAQ Data
    const FAQS = [
      { q: "How do I connect my MT5 account?", a: "Go to the MT5 Connect screen, enter your login, password, and server. Ensure 'Allow Automated Trading' is enabled in your MT5 settings." },
      { q: "Why did the bot stop trading?", a: "Possible reasons: Daily limit reached (5 trades), 3 consecutive losses (24h cooldown), news impact pause, or package exhausted." },
      { q: "How do I purchase more trades?", a: "Go to the Subscription screen and choose a package. Payments are processed securely via Flutterwave." },
      { q: "What is the risk per trade?", a: "Long-term: You set 1-10%. Short-term: Up to 10% dynamic. The bot always respects the 10% maximum of your account balance." },
      { q: "Is my data secure?", a: "Yes. All MT5 credentials are encrypted in Supabase Vault. We use RLS policies and do not share your personal data with third parties." }
    ];

    // Initialize
    function init() {
      renderFAQ();
      checkTheme();
    }

    function checkTheme() {
      const isDark = html.getAttribute('data-theme') === 'dark';
      if (isDark) {
        iconSun.classList.add('hidden');
        iconMoon.classList.remove('hidden');
      } else {
        iconSun.classList.remove('hidden');
        iconMoon.classList.add('hidden');
      }
    }

    // Theme Toggle
    themeToggle.addEventListener('click', () => {
      const isDark = html.getAttribute('data-theme') === 'light';
      html.setAttribute('data-theme', isDark ? 'dark' : 'light');
      iconSun.classList.toggle('hidden', !isDark);
      iconMoon.classList.toggle('hidden', isDark);
    });

    // FAQ Rendering
    function renderFAQ() {
      faqList.innerHTML = FAQS.map((item, index) => `
        <div class="faq-item" id="faq-${index}">
          <button class="faq-question" onclick="toggleFAQ(${index})">
            ${item.q}
            <svg class="faq-chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div class="faq-answer">${item.a}</div>
        </div>
      `).join('');
    }

    function toggleFAQ(index) {
      const el = document.getElementById(`faq-${index}`);
      el.classList.toggle('open');
    }

    // File Upload Handling
    function handleFileSelect(input) {
      const nameSpan = document.getElementById('fileName');
      if (input.files && input.files.length > 0) {
        nameSpan.textContent = input.files[0].name;
      } else {
        nameSpan.textContent = '';
      }
    }

    // Form Submission
    async function handleIssueSubmit(e) {
      e.preventDefault();
      
      const title = document.getElementById('issueTitle').value.trim();
      const desc = document.getElementById('issueDesc').value.trim();
      const fileInput = document.getElementById('issueFile');
      
      if (!title || !desc) {
        return showToast('Title and description are required.', 'error');
      }

      // UI Loading State
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Submitting...';

      try {
        /**
         * AI AGENT NOTE: ACTUAL SUBMISSION LOGIC
         * ---------------------------------------
         * 1. Upload File (if any) to Supabase Storage:
         *    const { data: uploadData, error: uploadError } = await supabase.storage
         *      .from('support-screenshots')
         *      .upload(`issues/${userId}/${Date.now()}_${fileName}`, file);
         * 
         * 2. Call Edge Function:
         *    const response = await fetch(SUPABASE_URL + '/functions/v1/submit-support-ticket', {
         *      method: 'POST',
         *      headers: { Authorization: `Bearer ${session.access_token}` },
         *      body: JSON.stringify({
         *        title,
         *        description: desc,
         *        screenshot_url: uploadData?.path || null
         *      })
         *    });
         */

        // Simulate Network Delay
        await new Promise(r => setTimeout(r, 1500));

        showToast('✓ Issue submitted. We will respond within 24 hours.', 'success');
        issueForm.reset();
        document.getElementById('fileName').textContent = '';

      } catch (error) {
        console.error(error);
        showToast('Submission failed. Please try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span class="btn-text">Submit Issue</span>';
      }
    }

    // Contact Handlers
    function handleContact(type) {
      if (type === 'email') {
        // AI AGENT NOTE: Use Linking.openURL('mailto:support@futuresbot.ug');
        window.location.href = 'mailto:support@futuresbot.ug';
      } else if (type === 'telegram') {
        // AI AGENT NOTE: Use Linking.openURL('tg://resolve?domain=FUTURES_Support');
        // Fallback to web if app not installed
        window.location.href = 'https://t.me/FUTURES_Support';
      }
    }

    function handleAcademy(e) {
      e.preventDefault();
      // AI AGENT NOTE: Use Linking.openURL('https://your-academy-url.com');
      alert('Opening Future Traders Academy...');
    }

    function showToast(msg, type) {
      toast.textContent = msg;
      toast.className = `toast visible ${type}`;
      setTimeout(() => { toast.classList.remove('visible'); }, 3000);
    }

    function goBack() {
      // navigation.goBack();
      window.history.back();
    }

    init();
  </script>
</body>
</html>
